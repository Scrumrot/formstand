name: Publish

on:
  push:
    tags:
      - "v*"
      - "cli-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-library:
    if: ${{ !startsWith(github.ref_name, 'cli-v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Fail fast on a tag that doesn't match the version being published —
      # otherwise the tag would silently publish whatever version package.json
      # happens to hold.
      - name: Verify tag matches package.json version
        run: |
          expected="${GITHUB_REF_NAME#v}"
          actual="$(node -p "require('./package.json').version")"
          if [ "$expected" != "$actual" ]; then
            echo "Tag ${GITHUB_REF_NAME} expects version ${expected}, but package.json holds ${actual}." >&2
            exit 1
          fi

      # Trusted publishing needs npm >= 11.5.1; Node 24.8+ is the first line
      # bundling npm >= 11.6 (24.0-24.4 shipped 11.3/11.4, below the floor),
      # so the floor is pinned explicitly rather than trusting whatever 24.x
      # a toolcache holds. Never upgrade npm in place instead (npm install
      # -g npm@latest) — it leaves a broken install whose libnpmpublish
      # can't resolve its sigstore dependency.
      - uses: actions/setup-node@v6
        with:
          node-version: ">=24.8"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # The root test suite renders the examples app.
      - name: Install example dependencies
        run: npm ci
        working-directory: examples

      # prepublishOnly only builds; run the full gate here before publishing.
      - name: Typecheck, lint, test
        run: npm run typecheck && npm run lint && npm run test:coverage

      # Authenticates via OIDC trusted publishing (configured on npmjs.com
      # for this repo + workflow file) — no token secret. --provenance stays
      # explicit even though trusted publishing generates it by default:
      # the flag is fail-CLOSED (publish errors if attestation can't be
      # produced), where the automatic path silently skips it.
      - name: Publish formstand
        run: npm publish --provenance

  publish-cli:
    if: ${{ startsWith(github.ref_name, 'cli-v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Fail fast on a tag that doesn't match the version being published —
      # otherwise the tag would silently publish whatever version package.json
      # happens to hold.
      - name: Verify tag matches cli/package.json version
        run: |
          expected="${GITHUB_REF_NAME#cli-v}"
          actual="$(node -p "require('./package.json').version")"
          if [ "$expected" != "$actual" ]; then
            echo "Tag ${GITHUB_REF_NAME} expects version ${expected}, but cli/package.json holds ${actual}." >&2
            exit 1
          fi
        working-directory: cli

      # Trusted publishing needs npm >= 11.5.1; Node 24.8+ is the first line
      # bundling npm >= 11.6 (24.0-24.4 shipped 11.3/11.4, below the floor),
      # so the floor is pinned explicitly rather than trusting whatever 24.x
      # a toolcache holds. Never upgrade npm in place instead (npm install
      # -g npm@latest) — it leaves a broken install whose libnpmpublish
      # can't resolve its sigstore dependency.
      - uses: actions/setup-node@v6
        with:
          node-version: ">=24.8"
          registry-url: https://registry.npmjs.org

      # The CLI test suite typechecks its generated output against the
      # library source (../src), which resolves react/zustand/zod types from
      # the repo root's node_modules — so the root install is needed even
      # though only cli/ publishes.
      - name: Install dependencies
        run: npm ci

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      # prepublishOnly runs typecheck + test + build before the publish.
      # Authenticates via OIDC trusted publishing (configured on npmjs.com
      # for this repo + workflow file) — no token secret. --provenance stays
      # explicit even though trusted publishing generates it by default:
      # the flag is fail-CLOSED (publish errors if attestation can't be
      # produced), where the automatic path silently skips it.
      - name: Publish formstand-cli
        run: npm publish --provenance
        working-directory: cli
