name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# CI only reads the repo; the checkout token never needs more (CodeQL
# actions/missing-workflow-permissions).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The examples smoke test and root typecheck reach into examples/src,
      # whose UI dependencies (MUI) live in the examples package.
      - name: Install example dependencies
        run: npm ci
        working-directory: examples

      # The smoke test resolves the deduped UI packages from the ROOT
      # lockfile while the deployed playground builds from the examples one;
      # fail loudly if a one-sided bump makes CI certify a different build
      # than the one that ships.
      - name: Check lockfiles agree on deduped packages
        run: node scripts/check-lockfile-sync.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Build docs
        run: npm run docs:build

      # The docs deploy builds the examples app with the examples' own
      # toolchain — run the same build here so dependency PRs against
      # examples/ get judged on it BEFORE they can break the deploy.
      - name: Build examples
        run: npm run build
        working-directory: examples

      # The built bundle must hold exactly one React copy — the formstand
      # alias reaches outside the examples package, and a second resolved
      # React crashes the deployed playground at startup. Only the artifact
      # shows this; jsdom tests can't.
      - name: Check the bundle holds a single React
        run: node scripts/check-single-react.mjs

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: CLI typecheck, test, build
        run: npm run typecheck && npm test && npm run build
        working-directory: cli

      # The "Generated" playground tab must be exactly what the current CLI
      # emits — regenerate and fail on drift, so the demo can't quietly go
      # stale as the emitters evolve.
      - name: Verify generated demos match the CLI's output
        run: node scripts/generate-cli-demos.mjs && git diff --exit-code examples/src/generated
