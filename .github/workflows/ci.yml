name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The examples smoke test and root typecheck reach into examples/src,
      # whose UI dependencies (MUI) live in the examples package.
      - name: Install example dependencies
        run: npm ci
        working-directory: examples

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Build docs
        run: npm run docs:build

      # The docs deploy builds the examples app with the examples' own
      # toolchain — run the same build here so dependency PRs against
      # examples/ get judged on it BEFORE they can break the deploy.
      - name: Build examples
        run: npm run build
        working-directory: examples

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: CLI typecheck, test, build
        run: npm run typecheck && npm test && npm run build
        working-directory: cli
